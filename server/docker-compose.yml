version: '3.8'

services:
  # CPU 版本 (不需要 GPU)
  gesture-server:
    build: .
    container_name: blackhole-gesture-server
    expose:
      - "5000"
    environment:
      - CUDA_VISIBLE_DEVICES=-1
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 注意: GPU 版本需要 NVIDIA Docker 支持
  # 如果您的系统有 NVIDIA GPU，可以使用以下配置:
  #
  # gesture-server-gpu:
  #   build: .
  #   container_name: blackhole-gesture-server-gpu
  #   expose:
  #     - "5000"
  #   environment:
  #     - NVIDIA_VISIBLE_DEVICES=all
  #     - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   volumes:
  #     - ./data:/app/data
  #     - ./logs:/app/logs
  #   restart: unless-stopped
