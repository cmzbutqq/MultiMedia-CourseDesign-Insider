services:
  # 前端 Web 服务 (生产版)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: prod
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - server

  # 手势识别服务器
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - CUDA_VISIBLE_DEVICES=-1
    volumes:
      - ./server/data:/app/data
      - ./server/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
