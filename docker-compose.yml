name: multimedia-coursework

services:
  web-dev:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: dev
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules

  web-prod:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: prod
    ports:
      - "8080:80"

volumes:
  web_node_modules:
