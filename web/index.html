<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blackhole — WebGL2</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050508;
      }
      #c {
        display: block;
        width: 100%;
        height: 100%;
      }
      #trail {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      #fps {
        position: fixed;
        left: 12px;
        top: 10px;
        z-index: 40;
        pointer-events: none;
        color: #fff;
        font: 700 28px/1 ui-monospace, SFMono-Regular, Consolas, monospace;
        text-shadow:
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000,
          0 0 6px rgba(0, 0, 0, 0.6);
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <canvas id="trail" aria-hidden="true"></canvas>
    <div id="fps" aria-hidden="true">0</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
