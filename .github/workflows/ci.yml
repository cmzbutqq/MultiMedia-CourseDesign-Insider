name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: python -m pip install flask flask-cors flask-socketio eventlet

      - name: Test
        run: python -m unittest discover -s server/tests -p 'test_*.py'
